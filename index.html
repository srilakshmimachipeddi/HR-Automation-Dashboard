"Backend returned NULL"

data.error
);

return;

}

data

})

err
);

alert(
"Backend Failure: " +
err
);

function initDashboard(data) {

"Dashboard data received:",
data

data.quarterlyAttrition || {}

function renderKpis(kpis) {

const container =
document.getElementById(
'kpi-container'
);

container.innerHTML='';


const cards = [

['Total Headcount',kpis.totalHeadcount],

['India Headcount',kpis.indiaHeadcount],

['US Headcount',kpis.usHeadcount],

['Confirmed',kpis.confirmed],

['Under Probation',kpis.probation],

['Interns',kpis.interns],

['Active Risks',kpis.activeRisks]

];


cards.forEach(card=>{

container.innerHTML += `

<div class="kpi-card">

<div class="title">

${card[0]}

</div>

<div class="value">

${card[1] || 0}

</div>

</div>

`;

});

}
function renderAlerts(alerts, config) {
    const lwdContainer = document.getElementById('lwd-alerts');
    lwdContainer.innerHTML = `<h3>LWD Alerts (within ${config.LWD_DAYS} days)</h3>`;
    if ((alerts.lwd || []).length > 0) {
      alerts.lwd.forEach(a => {
        lwdContainer.innerHTML += `<div class="alert-item">${a['Employee Name']} - LWD: ${new Date(a['Last Working Day (Interns Only)']).toLocaleDateString()}</div>`;
      });
    } else {
      lwdContainer.innerHTML += '<p>No upcoming LWDs.</p>';
    }

    const probContainer = document.getElementById('probation-alerts');
    probContainer.innerHTML = `<h3>Probation Alerts (confirmation within ${config.PROBATION_NOTICE_DAYS} days)</h3>`;
    if ((alerts.probation || []).length > 0) {
      alerts.probation.forEach(a => {
        probContainer.innerHTML += `<div class="alert-item">${a['Employee Name']} - Confirmation: ${new Date(a.confirmationDate).toLocaleDateString()}</div>`;
      });
    } else {
      probContainer.innerHTML += '<p>No employees nearing confirmation.</p>';
    }
  }

  function renderDeptPieChart(breakdown) {
    const dataArray = [['Department', 'Headcount'], ...Object.entries(breakdown)];
    const data = google.visualization.arrayToDataTable(dataArray);
    const options = { title: 'Department Headcount Distribution', pieHole: 0.4 };
    const chart = new google.visualization.PieChart(document.getElementById('dept-pie-chart'));
    chart.draw(data, options);
  }

  function renderAttritionChart(attrition) {
    const sortedQuarters = Object.entries(attrition).sort((a, b) => a[0].localeCompare(b[0]));
    const dataArray = [['Quarter', 'Leavers'], ...sortedQuarters];
    const data = google.visualization.arrayToDataTable(dataArray);
    const options = { title: 'Quarterly Attrition Trend', curveType: 'function', legend: { position: 'bottom' } };
    const chart = new google.visualization.LineChart(document.getElementById('attrition-line-chart'));
    chart.draw(data, options);
  }

data,

  function renderDrillDown(employees) {
    const filtersContainer = document.getElementById('drill-down-filters');
    const table = document.getElementById('drill-down-table');

    const departments = ['All', ...new Set(employees.map(e => e['Department']).filter(Boolean))];
    const managers = ['All', ...new Set(employees.map(e => e['Reporting Manager']).filter(Boolean))];
    const statuses = ['All', ...new Set(employees.map(e => e['Employment Status']).filter(Boolean))];

    filtersContainer.innerHTML = `
      <div><label>Region:</label><select id="filter-region" onchange="applyWebAppFilters()"><option>All</option><option>India</option><option>US</option></select></div>
      <div><label>Department:</label><select id="filter-dept" onchange="applyWebAppFilters()">${departments.map(d => `<option>${d}</option>`).join('')}</select></div>
      <div><label>Manager:</label><select id="filter-manager" onchange="applyWebAppFilters()">${managers.map(m => `<option>${m}</option>`).join('')}</select></div>
      <div><label>Status:</label><select id="filter-status" onchange="applyWebAppFilters()">${statuses.map(s => `<option>${s}</option>`).join('')}</select></div>
    `;
    
    applyWebAppFilters();
  }

  function applyWebAppFilters() {
    const region = document.getElementById('filter-region').value;
    const department = document.getElementById('filter-dept').value;
    const manager = document.getElementById('filter-manager').value;
    const status = document.getElementById('filter-status').value;

    let employees = [];
    if (region === 'All') {
        employees = fullData.allEmployees || [];
    } else if (region === 'India') {
        employees = fullData.allEmployees.filter(e => e['Employee ID'].startsWith('IN'));
    } else {
        employees = fullData.allEmployees.filter(e => e['Employee ID'].startsWith('US'));
    }

    const filteredData = employees.filter(emp => {
        const deptMatch = (department === 'All') || (emp['Department'] === department);
        const managerMatch = (manager === 'All') || (emp['Reporting Manager'] === manager);
        const statusMatch = (status === 'All') || (emp['Employment Status'] === status);
        return deptMatch && managerMatch && statusMatch;
    });

    const table = document.getElementById('drill-down-table');
    table.innerHTML = ''; // Clear table

    if (filteredData.length > 0) {
      const headers = Object.keys(filteredData[0] || {});
      let headerHtml = '<thead><tr>';
      headers.forEach(h => headerHtml += `<th>${h}</th>`);
      headerHtml += '</tr></thead>';
      
      let bodyHtml = '<tbody>';
      filteredData.forEach(emp => {
        bodyHtml += '<tr>';
        headers.forEach(h => {
        bodyHtml += `<td><input
        class="edit-cell"

        value="${emp[h] || ''}"

        data-id="${emp['Employee ID']}"

        data-field="${h}"

        style="
        width:100%;
        border:none;
        background:transparent;
        padding:6px;
        "
        />

        </td>

        `;

        });

        bodyHtml += `

        <td>

        <button
        class="save-btn"

        onclick="
        saveRow(
        '${emp['Employee ID']}'
        )
        "

        >

        Save

        </button>

        </td>

        `;

        bodyHtml += '</tr>';

        });
      bodyHtml += '</tbody>';

      table.innerHTML = headerHtml + bodyHtml;
    } else {
      table.innerHTML = '<tbody><tr><td>No employees match the selected criteria.</td></tr></tbody>';
    }
  }

  function saveRow(
employeeId
){

const inputs =

document.querySelectorAll(
`input[data-id="${employeeId}"]`
);

const updated = {};

inputs.forEach(
i=>{

updated[
i.dataset.field
]=
i.value;

});

google.script.run

.withSuccessHandler(
()=>{

alert(
'Employee updated'
);

applyWebAppFilters();

})

.withFailureHandler(
err=>{

alert(
err.message
);

})

.updateEmployee(
employeeId,
updated
);

}

function renderFinance(finance){

const container =
document.getElementById(
'finance-summary'
);

if(!container)return;

const total =
Object.values(
finance.regionSummary
)
.reduce(
(a,b)=>a+b,
0
);

container.innerHTML = `

<div class="finance-grid">

<div class="finance-card">
<h3>Total Payroll</h3>
₹${total.toLocaleString()}
</div>

<div class="finance-card">
<h3>India Payroll</h3>
₹${(finance.regionSummary.India||0).toLocaleString()}
</div>

<div class="finance-card">
<h3>US Payroll</h3>
₹${(finance.regionSummary.US||0).toLocaleString()}
</div>

</div>

<table class="finance-table">

${Object.entries(
finance.departmentSummary
)

.map(
([k,v])=>

`

<tr>
<td>${k}</td>
<td>₹${v.toLocaleString()}</td>
</tr>

`

)

.join('')}

</table>

`;

}

function showTab(tab, button = null){

document
.querySelectorAll('.page-section')
.forEach(
page =>
page.classList.add('hidden')
);

const selected =
document.getElementById(tab);

if(selected){

selected.classList.remove(
'hidden'
);

}

document
.querySelectorAll('.nav-btn')
.forEach(
btn =>
btn.classList.remove(
'active'
)
);

if(button){

button.classList.add(
'active'
);

}
else{

const active =
document.querySelector(
`[data-page="${tab}"]`
);

if(active){

active.classList.add(
'active'
);

}

}

}
